<script>
const BACKEND = "https://web-renderer.onrender.com/render";

async function loadWebsite() {
    const iframe = document.getElementById('websiteFrame');
    const errorMessage = document.getElementById('errorMessage');
    let url = document.getElementById('urlInput').value.trim();

    if (!url) { alert("Enter a URL"); return; }
    if (!url.startsWith("http://") && !url.startsWith("https://")) url = "https://" + url;

    try {
        const response = await fetch(`${BACKEND}?url=${encodeURIComponent(url)}`);
        if (!response.ok) throw new Error("Failed to fetch");

        let html = await response.text();

        // Inject base tag only — safe
        const baseTag = `<base href="${url}">`;
        if (html.includes("<head>")) html = html.replace("<head>", `<head>${baseTag}`);
        else html = baseTag + html;

        iframe.srcdoc = html;
        errorMessage.innerText = "";

    } catch (err) {
        console.error(err);
        errorMessage.innerText = "Failed to load site";
    }
}

function toggleFullScreen() {
    const iframe = document.getElementById('websiteFrame');
    if (iframe.requestFullscreen) iframe.requestFullscreen();
    else if (iframe.webkitRequestFullscreen) iframe.webkitRequestFullscreen();
    else if (iframe.msRequestFullscreen) iframe.msRequestFullscreen();
}
</script>
