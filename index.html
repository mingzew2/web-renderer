<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Website Viewer</title>
<style>
body { font-family: Arial; margin:0; padding:20px; display:flex; flex-direction:column; align-items:center; background:#f4f4f4;}
input[type=text]{width:80%;padding:10px;margin-bottom:10px;border:1px solid #ccc;border-radius:4px;}
button{padding:10px 15px;border:none;background:#28a745;color:white;border-radius:4px;cursor:pointer;margin-bottom:10px;}
button:hover{background:#218838;}
.fullscreen-button{background:#007bff;}
.fullscreen-button:hover{background:#0056b3;}
iframe{border:none;width:min(1200px,80vw);aspect-ratio:16/9;}
#errorMessage{color:red;margin-top:10px;}
</style>
</head>
<body>

<h1>Website Viewer</h1>
<input type="text" id="urlInput" placeholder="Enter website URL (http:// or https://)">
<button onclick="loadWebsite()">Load Website</button>
<button class="fullscreen-button" onclick="toggleFullScreen()">Toggle Full Screen</button>

<iframe id="websiteFrame" sandbox="allow-same-origin allow-scripts allow-forms allow-popups"></iframe>
<div id="errorMessage"></div>

<script>
const BACKEND = "https://web-renderer.onrender.com/render";

async function loadWebsite() {
    const iframe = document.getElementById('websiteFrame');
    const errorMessage = document.getElementById('errorMessage');
    let url = document.getElementById('urlInput').value.trim();

    if(!url){ alert("Enter a URL"); return; }
    if(!url.startsWith("http://")&&!url.startsWith("https://")) url="https://"+url;

    try{
        const response = await fetch(`${BACKEND}?url=${encodeURIComponent(url)}`);
        if(!response.ok) throw new Error("Backend fetch failed");

        let html = await response.text();
        const baseTag = `<base href="${url}">`;
        if(html.includes("<head>")) html = html.replace("<head>", `<head>${baseTag}`);
        else html = baseTag + html;

        iframe.srcdoc = html;
        errorMessage.innerText="";
    }catch(err){
        console.error("Error fetching page:", err);
        errorMessage.innerText="Failed to load site: "+err.message;
    }
}

function toggleFullScreen(){
    const iframe = document.getElementById('websiteFrame');
    if(iframe.requestFullscreen) iframe.requestFullscreen();
    else if(iframe.webkitRequestFullscreen) iframe.webkitRequestFullscreen();
    else if(iframe.msRequestFullscreen) iframe.msRequestFullscreen();
}
</script>

</body>
</html>
